# ============================================================
# L2 防线补强：Stacked PR 自动换基
# 触发：上游 PR merge 到 main 后
# 动作：
#   1) 找到所有 base=上游 head 分支 的开放 PR（即“下游堆叠 PR”）
#   2) 将这些 PR 的 base 自动切回 main
#   3) 尝试调用 update-branch 让 PR 分支保持 up-to-date（等价于 GitHub UI 的 Update branch）
# 说明：update-branch 会把 base 分支合入 head（不是严格的 git rebase）。
#       由于仓库只允许 squash merge，这不会污染 main 的线性历史。
# ============================================================
name: Stacked PR 自动换基

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  retarget-stacked:
    name: 自动换基下游 PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Retarget downstream PRs
        uses: actions/github-script@v7
        with:
          script: |
            const mergedPr = context.payload.pull_request;

            // 只处理同仓库分支（fork PR 无法改写 head 分支）
            const sameRepo = mergedPr.head?.repo?.full_name === mergedPr.base?.repo?.full_name;
            if (!sameRepo) {
              console.log('PR 来自 fork，跳过 stacked retarget');
              return;
            }

            const oldBase = mergedPr.head.ref;      // 上游 PR 的 head 分支
            const newBase = mergedPr.base.ref;      // 一般为 main

            if (!oldBase || !newBase) {
              console.log('无法解析分支信息，跳过');
              return;
            }

            // 找到所有 base=oldBase 的开放 PR（即：以该分支为 base 的“下游堆叠 PR”）
            const downstreamPRs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: oldBase,
              per_page: 100,
            });

            if (downstreamPRs.length === 0) {
              console.log(`没有找到 base=${oldBase} 的下游 PR`);
              return;
            }

            console.log(`发现 ${downstreamPRs.length} 个下游 PR，开始换基: ${oldBase} -> ${newBase}`);

            for (const pr of downstreamPRs) {
              console.log(`- PR #${pr.number}: retarget base ${oldBase} -> ${newBase}`);

              // 1) 换基（把 PR 的 base 改为 main）
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                base: newBase,
              });

              // 2) 尝试 update-branch（保持 up-to-date；相当于 GitHub UI 的 Update branch）
              // expected_head_sha 防止竞态：如果 PR 同时有新提交，会直接拒绝并跳过。
              try {
                await github.request('PUT /repos/{owner}/{repo}/pulls/{pull_number}/update-branch', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  expected_head_sha: pr.head.sha,
                });
                console.log(`  update-branch: OK`);
              } catch (error) {
                console.log(`  update-branch: SKIP (${error.message.split('\n')[0]})`);
              }
            }
