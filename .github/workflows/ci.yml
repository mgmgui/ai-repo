# ============================================================
# L4 防线：CI 全量验证流水线
# 触发：每次 PR 创建或更新时自动运行
# 目标：确保进入 main 的代码必须通过全部检查
# ============================================================
name: CI - 代码质量验证

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # Job 1：代码规范与类型检查
  # ──────────────────────────────────────────
  lint-and-typecheck:
    name: 规范检查 & 类型验证
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: ESLint 检查
        run: npm run lint

      - name: Prettier 格式检查
        run: npm run format:check

      - name: TypeScript 类型检查
        run: npm run typecheck

  # ──────────────────────────────────────────
  # Job 2：单元测试 + 覆盖率门禁
  # ──────────────────────────────────────────
  test:
    name: 单元测试 & 覆盖率检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行测试（含覆盖率）
        run: npm run test:coverage

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ──────────────────────────────────────────
  # Job 3：构建验证
  # ──────────────────────────────────────────
  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build