# ============================================================
# 低风险变更自动合并（chore/* 分支）
# 触发条件：AI 审查通过 + CI 全绿 + 低风险类型
# 覆盖范围：文档、测试、配置、依赖更新
# ============================================================
name: 低风险变更自动合并

on:
  pull_request:
    types: [labeled]
    branches: [main]

jobs:
  auto-merge:
    name: 自动合并低风险 PR
    runs-on: ubuntu-latest
    # 仅当 PR 被标记为 auto-merge-eligible 时触发
    if: contains(github.event.pull_request.labels.*.name, 'auto-merge-eligible')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 检查 PR 变更范围（安全阀）
        uses: actions/github-script@v7
        id: safety-check
        with:
          script: |
            // 获取 PR 变更的文件列表
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            // 禁止自动合并的文件模式（核心业务逻辑）
            const blockedPatterns = [
              /src\/core\//,
              /src\/services\//,
              /\.secret/,
              /payment/,
              /security/,
            ];
            
            const blockedFiles = files.data.filter(f =>
              blockedPatterns.some(p => p.test(f.filename))
            );
            
            if (blockedFiles.length > 0) {
              core.setFailed(`自动合并被阻断：检测到核心业务文件变更: ${blockedFiles.map(f => f.filename).join(', ')}`);
            } else {
              console.log('安全检查通过，允许自动合并');
            }

      - name: 自动 Approve PR
        if: steps.safety-check.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // 由 bot 自动批准 PR，满足分支保护规则的 approval 要求
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '🤖 自动批准：安全阀检查通过，变更范围属于低风险类型（文档/配置/测试）。'
            });
            console.log('自动 Approve 完成');

      - name: 启用自动合并
        if: steps.safety-check.outcome == 'success'
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}