# ============================================================
# 低风险变更自动合并（chore/* 分支）
# 触发条件：PR 标记 auto-merge-eligible + 安全阀通过
# 覆盖范围：文档、测试、配置、依赖更新
# 前置配置：
#   1. Settings → General → Pull Requests → Allow auto-merge
#   2. Settings → Actions → General → Allow GitHub Actions to create approvals
# ============================================================
name: 低风险变更自动合并

on:
  pull_request:
    types: [labeled, synchronize]
    branches: [main]

jobs:
  auto-merge:
    name: 自动合并低风险 PR
    runs-on: ubuntu-latest
    # 仅当 PR 被标记为 auto-merge-eligible 时触发
    if: contains(github.event.pull_request.labels.*.name, 'auto-merge-eligible')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 检查 PR 变更范围（安全阀）
        uses: actions/github-script@v7
        id: safety-check
        with:
          script: |
            // 获取 PR 变更的文件列表
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            // 禁止自动合并的文件模式（核心业务逻辑）
            const blockedPatterns = [
              /src\/core\//,
              /src\/services\//,
              /\.secret/,
              /payment/,
              /security/,
            ];
            
            const blockedFiles = files.data.filter(f =>
              blockedPatterns.some(p => p.test(f.filename))
            );
            
            if (blockedFiles.length > 0) {
              core.setFailed(`自动合并被阻断：检测到核心业务文件变更: ${blockedFiles.map(f => f.filename).join(', ')}`);
            } else {
              console.log('安全检查通过，允许自动合并');
            }

      - name: 等待 CI 检查完成
        if: steps.safety-check.outcome == 'success'
        uses: actions/github-script@v7
        id: wait-for-ci
        with:
          script: |
            // 等待所有 required status checks 完成
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            
            const requiredChecks = [
              '规范检查 & 类型验证',
              '单元测试 & 覆盖率检查',
              '构建验证',
            ];
            
            const maxAttempts = 30;   // 最多等待 30 次
            const delayMs = 15000;    // 每次间隔 15 秒（共约 7.5 分钟）
            
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`检查 CI 状态 (第 ${attempt}/${maxAttempts} 次)...`);
              
              const { data: checks } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: context.payload.pull_request.head.sha,
              });
              
              const checkNames = checks.check_runs.map(c => c.name);
              const allCompleted = requiredChecks.every(name => 
                checkNames.some(cn => cn.includes(name))
              );
              
              if (!allCompleted) {
                console.log('CI 检查尚未创建，继续等待...');
                await new Promise(r => setTimeout(r, delayMs));
                continue;
              }
              
              const allPassed = requiredChecks.every(name => {
                const run = checks.check_runs.find(c => c.name.includes(name));
                return run && run.status === 'completed' && run.conclusion === 'success';
              });
              
              if (allPassed) {
                console.log('所有必需 CI 检查已通过');
                return;
              }
              
              const anyFailed = requiredChecks.some(name => {
                const run = checks.check_runs.find(c => c.name.includes(name));
                return run && run.status === 'completed' && run.conclusion !== 'success';
              });
              
              if (anyFailed) {
                core.setFailed('CI 检查失败，自动合并中止');
                return;
              }
              
              // 还在运行中
              await new Promise(r => setTimeout(r, delayMs));
            }
            
            core.setFailed('等待 CI 超时，自动合并中止');

      - name: 自动 Approve PR
        if: steps.safety-check.outcome == 'success' && steps.wait-for-ci.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // 由 bot 自动批准 PR，满足分支保护规则的 approval 要求
            // 前提：Settings → Actions → General → Allow GitHub Actions to create approvals 已启用
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '🤖 自动批准：安全阀检查通过 + CI 全绿，变更属于低风险类型（文档/配置/测试）。'
            });
            console.log('自动 Approve 完成');

      - name: 启用自动合并
        if: steps.safety-check.outcome == 'success' && steps.wait-for-ci.outcome == 'success'
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}